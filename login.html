<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Password Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Password Manager</h1>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn-primary">Log In</button>
            </form>

            <!-- shown only when the user is locked out -->
            <div id="lockout-box" style="display:none; margin-top:15px; padding:14px; background:#fdecea; border:1px solid #e57373; border-radius:6px; text-align:center;">
                <strong style="color:#c0392b;">Too many failed attempts</strong>
                <p style="margin:6px 0 0; color:#333;">Try again in <strong id="lockout-counter" style="font-size:1.3em;">--</strong> seconds</p>
            </div>

            <p class="auth-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
